<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Airtable CleanUp</title>
    <style>
        :root {
            --primary: #2563eb; --bg: #f8fafc; --card-bg: #ffffff;
            --text: #1e293b; --border: #e2e8f0; --error: #ef4444;
            --success: #22c55e; --accent: #f59e0b;
        }

        body { font-family: system-ui; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 320px; background: white; border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; overflow-y: auto; flex-shrink: 0; }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
        label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #64748b; }
        input[type="text"], input[type="password"], select { padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
        select[multiple] { height: 120px; }
        select:disabled { background: #f1f5f9; color: #94a3b8; }

        .btn { padding: 0.5rem 0.8rem; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #f1f5f9; color: #1e293b; border: 1px solid var(--border); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
        .btn-outline:hover { background: #eff6ff; }

        .schema-status { font-size: 0.75rem; padding: 0.4rem 0.6rem; border-radius: 4px; text-align: center; }
        .schema-status.ok { background: #dcfce7; color: #166534; }
        .schema-status.error { background: #fee2e2; color: #991b1b; }
        .schema-status.loading { background: #fef9c3; color: #854d0e; }

        .fields-list { display: flex; flex-direction: column; gap: 4px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border); border-radius: 4px; padding: 0.4rem; }
        .field-checkbox { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
        .field-checkbox:hover { background: #f1f5f9; }
        .field-checkbox input { width: auto; margin: 0; }

        .group-card { background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 2rem; overflow: hidden; }
        .group-card.is-processed { border: 2px solid var(--success); opacity: 0.8; }
        .group-header { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
        .group-title { font-weight: bold; color: var(--primary); }

        .records-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .records-table th { background: #f8fafc; padding: 0.5rem 0.7rem; text-align: left; font-size: 0.65rem; text-transform: uppercase; color: #64748b; border-bottom: 1px solid var(--border); white-space: nowrap; }
        .records-table td { padding: 0.5rem 0.7rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .records-table tr.is-master td { background: #f0fdf4; }
        .records-table tr.is-master td:first-child { border-left: 4px solid var(--success); }

        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }
        .badge-master { background: #dcfce7; color: #166534; }
        .badge-processed { background: #dcfce7; color: #166534; text-transform: uppercase; }
        .badge-type { background: #e0f2fe; color: #0369a1; font-size: 0.6rem; margin-left: 4px; }

        .actions-cell { display: flex; gap: 4px; align-items: center; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.72rem; white-space: nowrap; width: auto; }

        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: none; place-items: center; z-index: 1000; flex-direction: column; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        hr { border: none; border-top: 1px solid var(--border); margin: 0.2rem 0; }
        .section-title { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.2rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3 style="margin:0;">⚡ Universal CleanUp</h3>

        <!-- STEP 1: Credentials -->
        <div class="section-title">1. Conexión</div>
        <div class="form-group"><label>API Key</label><input type="password" id="apiKey" placeholder="patXXXXXXXX"></div>
        <div class="form-group"><label>Base ID</label><input type="text" id="baseId" placeholder="appXXXXXXXX"></div>
        <button class="btn btn-outline" onclick="loadSchema()">🔍 Load Schema</button>
        <div id="schema-status" class="schema-status" style="display:none;"></div>

        <hr>

        <!-- STEP 2: Table + Fields (populated from schema) -->
        <div class="section-title">2. Configuración</div>
        <div class="form-group">
            <label>Table</label>
            <select id="tableName" disabled onchange="onTableChange()">
                <option value="">— Load schema first —</option>
            </select>
        </div>

        <div class="form-group">
            <label>Compare Fields <span style="font-size:0.6rem;color:#94a3b8;">(selecciona los campos a comparar)</span></label>
            <div id="compareFieldsList" class="fields-list" style="color:#94a3b8;font-size:0.8rem;padding:0.5rem;">
                Load schema to see fields
            </div>
        </div>

        <div class="form-group">
            <label>Checkbox Field <span class="badge-type">checkbox</span></label>
            <select id="checkboxField" disabled>
                <option value="">— none —</option>
            </select>
        </div>

        <div class="form-group">
            <label>Link Field <span class="badge-type">multipleRecordLinks</span></label>
            <select id="linkField" disabled>
                <option value="">— none —</option>
            </select>
        </div>

        <div style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="onlyUnprocessed" style="width:auto;">
            <label style="margin:0;text-transform:none;font-size:0.82rem;">Solo no procesados</label>
        </div>

        <button class="btn btn-primary" onclick="startScan()">🔎 Universal Scan</button>

        <hr>

        <div id="global-actions" style="display:none;">
            <button class="btn btn-success" onclick="markAllDetectedGroups()">✅ Mark ALL Unprocessed</button>
        </div>

        <div style="font-size: 0.75rem; text-align: center; color: #94a3b8; margin-top: auto; padding-top: 1rem;">
            Created by<br>
            <a href="https://gabrielneuman.com" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: bold;">Gabriel Neuman</a>
        </div>
    </div>

    <div class="main-content">
        <h1 id="stats" style="margin-top:0;">Dashboard</h1>
        <div id="results"></div>
    </div>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <h2 id="loader-title" style="margin:0;">Thinking...</h2>
        <div id="loader-progress" style="color:#64748b;font-size:0.9rem;"></div>
    </div>

    <script>
        let groups = [];
        let schemaData = null;         // { tables: [{ id, name, fields: [{id, name, type}] }] }
        let currentTableFields = [];   // campos de la tabla actualmente seleccionada

        // ── Persistencia ──────────────────────────────────────────────────────
        function saveLocal(key, val) { localStorage.setItem('clean_' + key, val); }
        function loadLocal(key) { return localStorage.getItem('clean_' + key) || ''; }

        // Restaurar API Key + Base ID al arrancar
        document.getElementById('apiKey').value = loadLocal('apiKey');
        document.getElementById('baseId').value = loadLocal('baseId');
        document.getElementById('onlyUnprocessed').checked = loadLocal('onlyUnprocessed') === 'true';

        // Si hay credenciales guardadas, auto-cargar el schema
        if (loadLocal('apiKey') && loadLocal('baseId')) {
            loadSchema(true);
        }

        // ── Schema Loading ─────────────────────────────────────────────────────
        async function loadSchema(silent = false) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseId = document.getElementById('baseId').value.trim();
            if (!apiKey || !baseId) {
                if (!silent) alert('Ingresa API Key y Base ID primero.');
                return;
            }
            saveLocal('apiKey', apiKey);
            saveLocal('baseId', baseId);

            const statusEl = document.getElementById('schema-status');
            statusEl.style.display = 'block';
            statusEl.className = 'schema-status loading';
            statusEl.textContent = 'Loading schema...';

            try {
                const res = await fetch(`/api/schema?apiKey=${encodeURIComponent(apiKey)}&baseId=${encodeURIComponent(baseId)}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Unknown error');

                schemaData = data;
                statusEl.className = 'schema-status ok';
                statusEl.textContent = `✓ ${data.tables.length} tables loaded`;

                populateTableDropdown();
            } catch (e) {
                statusEl.className = 'schema-status error';
                statusEl.textContent = '✗ ' + e.message;
            }
        }

        function populateTableDropdown() {
            const sel = document.getElementById('tableName');
            sel.innerHTML = '<option value="">— Select a table —</option>';
            (schemaData.tables || []).forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.name;
                opt.textContent = t.name;
                sel.appendChild(opt);
            });
            sel.disabled = false;

            // Restaurar tabla guardada
            const savedTable = loadLocal('tableName');
            if (savedTable) {
                sel.value = savedTable;
                onTableChange();
            }
        }

        function onTableChange() {
            const tableName = document.getElementById('tableName').value;
            saveLocal('tableName', tableName);

            if (!schemaData || !tableName) {
                currentTableFields = [];
                return;
            }

            const tableSchema = schemaData.tables.find(t => t.name === tableName);
            if (!tableSchema) return;

            currentTableFields = tableSchema.fields;
            populateFieldSelectors();
        }

        function populateFieldSelectors() {
            const savedCompare = loadLocal('fieldsToCompare');
            const savedCheckbox = loadLocal('checkboxField');
            const savedLink = loadLocal('linkField');

            // ── Compare Fields (checkboxes) ──
            const listEl = document.getElementById('compareFieldsList');
            listEl.innerHTML = '';
            currentTableFields.forEach(f => {
                const label = document.createElement('label');
                label.className = 'field-checkbox';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = f.name;
                cb.dataset.fieldId = f.id;
                // Restaurar selección guardada
                if (savedCompare) {
                    const saved = savedCompare.split(',').map(s => s.trim());
                    cb.checked = saved.includes(f.name);
                }
                cb.onchange = () => saveLocal('fieldsToCompare', getSelectedCompareFields().join(','));
                label.appendChild(cb);
                label.appendChild(document.createTextNode(f.name));
                const typeBadge = document.createElement('span');
                typeBadge.className = 'badge-type';
                typeBadge.style.cssText = 'background:#e0f2fe;color:#0369a1;font-size:0.6rem;padding:1px 4px;border-radius:3px;margin-left:auto;';
                typeBadge.textContent = f.type;
                label.appendChild(typeBadge);
                listEl.appendChild(label);
            });

            // ── Checkbox Field (solo tipo checkbox) ──
            const checkboxSel = document.getElementById('checkboxField');
            checkboxSel.innerHTML = '<option value="">— none —</option>';
            currentTableFields.filter(f => f.type === 'checkbox').forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.name;
                opt.textContent = f.name;
                if (f.name === savedCheckbox) opt.selected = true;
                checkboxSel.appendChild(opt);
            });
            checkboxSel.disabled = false;
            checkboxSel.onchange = () => saveLocal('checkboxField', checkboxSel.value);

            // ── Link Field (solo tipo multipleRecordLinks) ──
            const linkSel = document.getElementById('linkField');
            linkSel.innerHTML = '<option value="">— none —</option>';
            currentTableFields.filter(f => f.type === 'multipleRecordLinks').forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.name;
                opt.textContent = f.name;
                if (f.name === savedLink) opt.selected = true;
                linkSel.appendChild(opt);
            });
            linkSel.disabled = false;
            linkSel.onchange = () => saveLocal('linkField', linkSel.value);
        }

        function getSelectedCompareFields() {
            return Array.from(document.querySelectorAll('#compareFieldsList input[type=checkbox]:checked'))
                .map(cb => cb.value);
        }

        // ── Scan ───────────────────────────────────────────────────────────────
        async function startScan() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const baseId = document.getElementById('baseId').value.trim();
            const tableName = document.getElementById('tableName').value;
            const fieldsToCompare = getSelectedCompareFields().join(',');
            const checkboxField = document.getElementById('checkboxField').value;
            const onlyUnprocessed = document.getElementById('onlyUnprocessed').checked;

            if (!tableName) return alert('Selecciona una tabla primero.');
            if (!fieldsToCompare) return alert('Selecciona al menos un campo para comparar.');

            saveLocal('fieldsToCompare', fieldsToCompare);
            saveLocal('checkboxField', checkboxField);
            saveLocal('linkField', document.getElementById('linkField').value);
            saveLocal('onlyUnprocessed', onlyUnprocessed.toString());

            showLoader('Scanning duplicates...');
            try {
                const res = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, baseId, tableName, fieldsToCompare, checkboxField, onlyUnprocessed: onlyUnprocessed.toString() })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Scan failed');

                groups = data;
                groups.forEach(g => { g.masterId = g.records[0].id; });
                render();
                document.getElementById('stats').innerText = `${groups.length} Duplicate Groups Found`;
                document.getElementById('global-actions').style.display = groups.length ? 'block' : 'none';
            } catch (e) { alert('Error: ' + e.message); }
            hideLoader();
        }

        // ── Actions ────────────────────────────────────────────────────────────
        function setMaster(gIdx, rId) {
            groups[gIdx].masterId = rId;
            render();
        }

        function dismissRecord(gIdx, rId) {
            groups[gIdx].records = groups[gIdx].records.filter(r => r.id !== rId);
            if (groups[gIdx].records.length < 2) {
                groups.splice(gIdx, 1);
            } else if (groups[gIdx].masterId === rId) {
                groups[gIdx].masterId = groups[gIdx].records[0].id;
            }
            render();
        }

        async function markGroup(gIdx) {
            const group = groups[gIdx];
            if (group.isProcessed) return;

            const copyIds = group.records.filter(r => r.id !== group.masterId).map(r => r.id);
            const payload = {
                apiKey: document.getElementById('apiKey').value,
                baseId: document.getElementById('baseId').value,
                tableName: document.getElementById('tableName').value,
                checkboxField: document.getElementById('checkboxField').value,
                linkField: document.getElementById('linkField').value,
                masterId: group.masterId,
                copyIds
            };

            const res = await fetch('/api/mark-duplicates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            if (result.success) {
                group.isProcessed = true;
                render();
            } else {
                throw new Error(result.error || 'mark-duplicates failed');
            }
        }

        async function markAllDetectedGroups() {
            const unprocessed = groups.filter(g => !g.isProcessed);
            if (!confirm(`Mark ${unprocessed.length} groups automatically?`)) return;

            showLoader(`Processing groups...`);
            const prog = document.getElementById('loader-progress');
            try {
                for (let i = 0; i < unprocessed.length; i++) {
                    prog.textContent = `${i + 1} / ${unprocessed.length}`;
                    const gIdx = groups.indexOf(unprocessed[i]);
                    await markGroup(gIdx);
                }
                alert('All unprocessed groups have been marked.');
            } catch (e) {
                alert('Error: ' + e.message);
            }
            hideLoader();
        }

        // ── Render ─────────────────────────────────────────────────────────────
        function render() {
            // Campos a mostrar: todos los del schema de la tabla (si está disponible),
            // o bien todos los campos que aparecen en los registros del primer grupo
            let displayFields;
            if (currentTableFields.length > 0) {
                displayFields = currentTableFields.map(f => f.name);
            } else if (groups.length > 0) {
                const allKeys = new Set();
                groups.forEach(g => g.records.forEach(r => Object.keys(r.fields).forEach(k => allKeys.add(k))));
                displayFields = Array.from(allKeys);
            } else {
                displayFields = [];
            }

            const container = document.getElementById('results');
            container.innerHTML = groups.map((group, gIdx) => `
                <div class="group-card ${group.isProcessed ? 'is-processed' : ''}">
                    <div class="group-header">
                        <div>
                            <span class="group-title">GROUP #${gIdx + 1}</span>
                            <span style="font-size:0.75rem;color:#64748b;margin-left:8px;">${group.records.length} records</span>
                            ${group.isProcessed ? '<span class="badge badge-processed" style="margin-left:8px;">PROCESSED</span>' : ''}
                        </div>
                        <button class="btn btn-sm ${group.isProcessed ? 'btn-disabled' : 'btn-success'}"
                                onclick="markGroup(${gIdx})" ${group.isProcessed ? 'disabled' : ''}>
                            ${group.isProcessed ? '✓ Done' : 'Confirm Master & Link'}
                        </button>
                    </div>
                    <div style="overflow-x:auto;">
                        <table class="records-table">
                            <thead>
                                <tr>
                                    <th style="min-width:80px;">Status</th>
                                    <th style="min-width:160px;color:#64748b;">Record ID</th>
                                    ${displayFields.map(f => `<th>${escHtml(f)}</th>`).join('')}
                                    <th style="min-width:180px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${group.records.map(rec => {
                                    const isCurrentMaster = rec.id === group.masterId;
                                    return `
                                    <tr class="${isCurrentMaster ? 'is-master' : ''}">
                                        <td>${isCurrentMaster ? '<span class="badge badge-master">MASTER</span>' : ''}</td>
                                        <td style="font-size:0.65rem;color:#94a3b8;font-family:monospace;">${rec.id}</td>
                                        ${displayFields.map(f => {
                                            const val = formatFieldValue(rec.fields[f]);
                                            return `<td title="${escHtml(val)}">${escHtml(val)}</td>`;
                                        }).join('')}
                                        <td>
                                            <div class="actions-cell">
                                                ${!isCurrentMaster && !group.isProcessed ? `<button class="btn btn-sm btn-secondary" onclick="setMaster(${gIdx}, '${rec.id}')">Set Master</button>` : ''}
                                                ${!group.isProcessed ? `<button class="btn btn-sm btn-secondary" style="color:var(--error);" onclick="dismissRecord(${gIdx}, '${rec.id}')" title="Not a duplicate">✕</button>` : ''}
                                                <a href="/duplicado/${rec.id}" class="btn btn-sm btn-primary" target="_blank">View</a>
                                            </div>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');
        }

        // ── Helpers ────────────────────────────────────────────────────────────
        function formatFieldValue(val) {
            if (val === undefined || val === null) return '';
            if (Array.isArray(val)) {
                // Linked records: array of {id} objects or strings
                return val.map(v => {
                    if (v === null || v === undefined) return '';
                    if (typeof v === 'object') return v.name || v.id || JSON.stringify(v);
                    return String(v);
                }).join(', ');
            }
            if (typeof val === 'object') return JSON.stringify(val);
            return String(val);
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showLoader(title = 'Working...') {
            document.getElementById('loader-title').textContent = title;
            document.getElementById('loader-progress').textContent = '';
            document.getElementById('loader').style.display = 'flex';
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
